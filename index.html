<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Thorana – Vesak 2024</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@400;700&family=Cinzel+Decorative:wght@700;900&display=swap');

        :root {
            --gold: #FFD700;
            --gold2: #FFA500;
            --gold3: #FF8C00;
            --deep: #0d0500;
            --mid: #3a1a00;
            --red: #CC0000;
            --white: #fff8e7;
            --glow: #ffe066;
            --lantern: #ff6600;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            background: var(--deep);
            font-family: 'Noto Serif Sinhala', serif;
            overflow-x: hidden;
            color: var(--white);
        }

        /* ── SKY ── */
        #sky {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('background.png') center/cover no-repeat fixed;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--d, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: .15;
                transform: scale(1)
            }

            50% {
                opacity: 1;
                transform: scale(1.4)
            }
        }

        /* floating lanterns */
        .lantern-wrap {
            position: fixed;
            bottom: -60px;
            z-index: 1;
            animation: floatUp var(--fu, 30s) linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                bottom: -60px;
                opacity: 0;
                transform: translateX(0)
            }

            10% {
                opacity: .9
            }

            90% {
                opacity: .7
            }

            100% {
                bottom: 110vh;
                opacity: 0;
                transform: translateX(var(--dx, 30px))
            }
        }

        .lantern {
            border-radius: 50% 50% 60% 60%;
            position: relative;
        }

        .lantern::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 8px;
            background: #cc6600;
        }

        .lantern::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5px;
            height: 12px;
            background: #cc6600;
            border-radius: 1px;
        }

        /* ── WRAPPER ── */
        #wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* ── HEADER ── */
        #header {
            width: 100%;
            text-align: center;
            padding: 24px 16px 8px;
            background: linear-gradient(180deg, #2a0900 0%, transparent 100%);
        }

        #header h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.2rem, 3.5vw, 2.4rem);
            color: var(--gold);
            text-shadow: 0 0 18px var(--gold2), 0 2px 4px #000;
            letter-spacing: 2px;
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        #header p {
            font-size: clamp(.7rem, 1.8vw, 1rem);
            color: #ffcc88;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        @keyframes glowPulse {

            0%,
            100% {
                text-shadow: 0 0 18px var(--gold2), 0 2px 4px #000
            }

            50% {
                text-shadow: 0 0 40px #ffe44d, 0 0 70px #ffaa00, 0 2px 4px #000
            }
        }

        /* buntings */
        .bunting-row {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 4px 0 6px;
            flex-wrap: wrap;
        }

        .flag-tri {
            width: 0;
            height: 0;
            border-left: 13px solid transparent;
            border-right: 13px solid transparent;
            border-top: 20px solid var(--c, red);
            animation: swayFlag 1.8s ease-in-out infinite;
            margin: 0 1px;
        }

        .flag-tri:nth-child(odd) {
            animation-delay: .3s;
        }

        @keyframes swayFlag {

            0%,
            100% {
                transform: rotate(-4deg)
            }

            50% {
                transform: rotate(4deg)
            }
        }

        /* ── MAIN LAYOUT: panels + arch ── */
        #stage {
            width: min(1100px, 98vw);
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            grid-template-rows: auto auto auto auto auto;
            gap: 10px;
            margin: 8px auto 0;
            align-items: center;
            justify-items: center;
        }

        /* arch takes centre 3 rows */
        #thorana {
            grid-column: 2;
            grid-row: 1 / 6;
            position: relative;
            width: 100%;
            user-select: none;
        }


        /* flames */
        .flame-cluster {
            position: absolute;
            top: -4%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }

        .flame {
            border-radius: 50% 50% 30% 30%;
            background: linear-gradient(180deg, #fff700 0%, #ff8800 50%, #ff2200 100%);
            animation: flameFlicker var(--ff, .6s) ease-in-out infinite alternate;
            box-shadow: 0 0 8px #ff880088;
        }

        @keyframes flameFlicker {
            0% {
                transform: scaleX(1) scaleY(1) rotate(-3deg);
                opacity: .9
            }

            100% {
                transform: scaleX(.8) scaleY(1.2) rotate(3deg);
                opacity: 1
            }
        }

        /* arch blinking lights */
        .blink-row {
            position: absolute;
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .blink-row.top {
            top: 0;
            left: 10%;
            width: 80%;
        }

        .blink-row.left-side {
            top: 5%;
            left: 2%;
            width: 13%;
            flex-direction: column;
        }

        .blink-row.right-side {
            top: 5%;
            right: 2%;
            width: 13%;
            flex-direction: column;
        }

        .bulb {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--bc, #FFD700);
            box-shadow: 0 0 6px 2px var(--bc, #FFD700);
            animation: blinkBulb var(--bd, 1s) step-start infinite;
        }

        @keyframes blinkBulb {

            0%,
            49% {
                opacity: 1
            }

            50%,
            100% {
                opacity: .1
            }
        }

        /* ═══════════════════════════════════════
       STORY PANELS — big, with light borders
    ═══════════════════════════════════════ */
        .panel-col-left {
            grid-column: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .panel-col-right {
            grid-column: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .panel-col-left,
        .panel-col-right {
            grid-row: 1 / 6;
            align-self: center;
        }

        .panel-btn {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.1;
            background: linear-gradient(145deg, #1e0800 0%, #2e1200 60%, #1a0600 100%);
            border-radius: 10px;
            cursor: pointer;
            overflow: visible;
            /* allow glow to bleed out */
            transition: transform .25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .panel-btn:hover {
            transform: scale(1.06);
        }

        /* ── animated rainbow border using conic-gradient ── */
        .panel-btn::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 13px;
            background: conic-gradient(#ff0000, #ff8800, #ffd700, #00ff88,
                    #00ccff, #aa44ff, #ff00cc, #ff0000);
            animation: rotateBorder 3s linear infinite;
            z-index: 0;
        }

        /* inner background cover */
        .panel-btn::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 8px;
            background: linear-gradient(145deg, #1e0800, #2e1200, #1a0600);
            z-index: 1;
        }

        @keyframes rotateBorder {
            to {
                transform: rotate(360deg);
            }
        }

        /* extra outer glow ring */
        .panel-glow-ring {
            position: absolute;
            inset: -8px;
            border-radius: 18px;
            background: transparent;
            box-shadow:
                0 0 10px 3px #ffd70066,
                0 0 20px 6px #ff880044,
                0 0 35px 10px #ff220022;
            animation: ringPulse 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ringPulse {

            0%,
            100% {
                box-shadow: 0 0 10px 3px #ffd70066, 0 0 20px 6px #ff880044, 0 0 35px 10px #ff220022;
            }

            50% {
                box-shadow: 0 0 16px 6px #ffd700aa, 0 0 32px 12px #ff880077, 0 0 55px 18px #ff220044;
            }
        }

        /* corner dot lights */
        .panel-corners {
            position: absolute;
            inset: -2px;
            pointer-events: none;
            z-index: 10;
        }

        .panel-corners span {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--cc, #FFD700);
            box-shadow: 0 0 8px 4px var(--cc, #FFD700);
            animation: cornerBlink 1s step-start infinite;
        }

        .panel-corners span:nth-child(1) {
            top: -3px;
            left: -3px;
            animation-delay: 0s;
        }

        .panel-corners span:nth-child(2) {
            top: -3px;
            right: -3px;
            animation-delay: .25s;
        }

        .panel-corners span:nth-child(3) {
            bottom: -3px;
            right: -3px;
            animation-delay: .5s;
        }

        .panel-corners span:nth-child(4) {
            bottom: -3px;
            left: -3px;
            animation-delay: .75s;
        }

        @keyframes cornerBlink {

            0%,
            49% {
                opacity: 1
            }

            50%,
            100% {
                opacity: .1
            }
        }

        /* side dot strips */
        .panel-dots {
            position: absolute;
            inset: 4px;
            pointer-events: none;
            z-index: 10;
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-dots canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* inner content (above pseudo-elements) */
        .panel-inner {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 8px 6px;
            width: 100%;
            height: 100%;
        }

        .panel-emoji {
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            animation: emojiFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 6px #ffd700);
        }

        @keyframes emojiFloat {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-5px)
            }
        }

        .panel-title {
            font-size: clamp(8px, 1.1vw, 13px);
            color: var(--gold);
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 8px #000, 0 0 4px #ffd700;
            line-height: 1.3;
        }

        .panel-sub {
            font-size: clamp(7px, 0.9vw, 11px);
            color: #ffcc88;
            text-align: center;
            opacity: .85;
        }

        /* hover shimmer */
        .panel-btn:hover .panel-inner {
            background: rgba(255, 200, 50, .06);
            border-radius: 8px;
        }

        .panel-btn:hover .panel-emoji {
            animation: emojiBounce .4s ease-in-out;
        }

        @keyframes emojiBounce {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.3)
            }

            100% {
                transform: scale(1)
            }
        }

        /* running-light strip on each panel edge */
        .run-strip {
            position: absolute;
            z-index: 8;
            pointer-events: none;
            display: flex;
        }

        .run-strip.top {
            top: -1px;
            left: 8px;
            right: 8px;
            height: 5px;
            flex-direction: row;
        }

        .run-strip.bottom {
            bottom: -1px;
            left: 8px;
            right: 8px;
            height: 5px;
            flex-direction: row;
        }

        .run-strip.left {
            left: -1px;
            top: 8px;
            bottom: 8px;
            width: 5px;
            flex-direction: column;
        }

        .run-strip.right {
            right: -1px;
            top: 8px;
            bottom: 8px;
            width: 5px;
            flex-direction: column;
        }

        .run-dot {
            flex: 0 0 auto;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--rc, #FFD700);
            box-shadow: 0 0 5px 2px var(--rc, #FFD700);
            opacity: 0;
            animation: runLight 2s linear infinite;
        }

        @keyframes runLight {
            0% {
                opacity: 0
            }

            10% {
                opacity: 1
            }

            90% {
                opacity: 1
            }

            100% {
                opacity: 0
            }
        }

        /* ── POPUP ── */
        #popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, .88);
            display: none;
            align-items: center;
            justify-content: center;
        }

        #popup-overlay.show {
            display: flex;
        }

        #popup-box {
            background: linear-gradient(135deg, #2a0d00 0%, #1a0500 100%);
            border: 3px solid var(--gold);
            border-radius: 16px;
            padding: 28px 24px 20px;
            max-width: 520px;
            width: 92%;
            position: relative;
            animation: popIn .3s ease;
            box-shadow: 0 0 40px #ffd70066, 0 0 80px #ff880033;
        }

        @keyframes popIn {
            from {
                transform: scale(.8);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        #popup-box h2 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--gold);
            font-size: 1.15rem;
            text-align: center;
            margin-bottom: 12px;
            text-shadow: 0 0 12px #ffd700;
        }

        #popup-story-art {
            font-size: 4.5rem;
            text-align: center;
            margin: 8px 0;
            animation: popArt 1.5s ease-in-out infinite;
        }

        @keyframes popArt {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.1)
            }
        }

        #popup-text {
            color: #ffe8bb;
            line-height: 1.75;
            font-size: .93rem;
        }

        #popup-close {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gold2);
            background: none;
            border: none;
            transition: color .2s;
        }

        #popup-close:hover {
            color: #fff;
        }

        #popup-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
        }

        .pop-btn {
            background: linear-gradient(90deg, #8b4500, #ffaa00, #8b4500);
            border: none;
            color: #000;
            font-weight: 700;
            font-size: .88rem;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform .15s;
        }

        .pop-btn:hover {
            transform: scale(1.05);
        }

        /* ── SOUND ── */
        #sound-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
            background: linear-gradient(135deg, var(--mid), #5a2a00);
            border: 2px solid var(--gold);
            border-radius: 50%;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 0 12px #ffd70088;
            transition: transform .2s;
        }

        #sound-btn:hover {
            transform: scale(1.12);
        }

        /* ── LANTERN ROW ── */
        #lantern-row {
            display: flex;
            gap: 16px;
            margin-top: 14px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .static-lantern {
            border-radius: 50% 50% 60% 60%;
            position: relative;
            animation: staticSway 2.5s ease-in-out infinite;
            transform-origin: top center;
        }

        .static-lantern::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 10px;
            background: #cc6600;
        }

        .static-lantern::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5px;
            height: 14px;
            background: #cc6600;
            border-radius: 1px;
        }

        @keyframes staticSway {

            0%,
            100% {
                transform: rotate(-6deg)
            }

            50% {
                transform: rotate(6deg)
            }
        }

        /* ── FOOTER ── */
        footer {
            margin-top: 24px;
            padding: 14px;
            text-align: center;
            color: #aa7744;
            font-size: .8rem;
            border-top: 1px solid #3a1a00;
            width: 100%;
        }

        footer span {
            color: var(--gold2);
        }

        /* ── RESPONSIVE ── */
        @media(max-width: 700px) {
            #stage {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto auto auto auto auto;
                gap: 8px;
            }

            .panel-col-left {
                grid-column: 1;
                grid-row: 2;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
            }

            .panel-col-right {
                grid-column: 2;
                grid-row: 2;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
            }

            .panel-col-left,
            .panel-col-right {
                align-self: start;
            }

            #thorana {
                grid-column: 1/3;
                grid-row: 1;
            }

            .panel-btn {
                width: calc(50% - 4px);
                aspect-ratio: 1 / 1;
            }
        }

        @media(max-width: 440px) {
            .panel-btn {
                aspect-ratio: 1 / 1;
            }
        }
    </style>
</head>

<body>

    <div id="sky"></div>

    <div id="wrapper">

        <!-- Header -->
        <div id="header">
            <h1>☸︎ Digital Thorana ☸︎</h1>
            <p>මහා කපි ජාතක කතාව</p>
        </div>
        <div class="bunting-row" id="bunting"></div>

        <!-- Stage -->
        <div id="stage">

            <!-- LEFT PANELS -->
            <div class="panel-col-left">
                <!-- p1 -->
                <div class="panel-btn" data-story="1">
                    <div class="panel-glow-ring"></div>
                    <div class="panel-corners">
                        <span style="--cc:#FFD700"></span><span style="--cc:#FF4400"></span>
                        <span style="--cc:#00FF88"></span><span style="--cc:#FF00AA"></span>
                    </div>
                    <div class="run-strip top" id="rs1t"></div>
                    <div class="run-strip bottom" id="rs1b"></div>
                    <div class="run-strip left" id="rs1l"></div>
                    <div class="run-strip right" id="rs1r"></div>
                    <div class="panel-inner" style="padding:0;position:relative;">
                        <img src="pic1.png"
                            style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:8px;z-index:2;">
                        <div
                            style="position:relative;z-index:6;width:100%;text-align:center;padding:6px;background:linear-gradient(transparent,rgba(0,0,0,0.75));border-radius:0 0 8px 8px;margin-top:auto;">
                            <div class="panel-title">1</div>
                        </div>
                    </div>
                </div>
                <!-- p2 -->
                <div class="panel-btn" data-story="2">
                    <div class="panel-glow-ring"></div>
                    <div class="panel-corners">
                        <span style="--cc:#00CCFF"></span><span style="--cc:#FFD700"></span>
                        <span style="--cc:#FF4400"></span><span style="--cc:#AA44FF"></span>
                    </div>
                    <div class="run-strip top" id="rs2t"></div>
                    <div class="run-strip bottom" id="rs2b"></div>
                    <div class="run-strip left" id="rs2l"></div>
                    <div class="run-strip right" id="rs2r"></div>
                    <div class="panel-inner" style="padding:0;position:relative;">
                        <img src="pic2.png"
                            style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:8px;z-index:2;">
                        <div
                            style="position:relative;z-index:6;width:100%;text-align:center;padding:6px;background:linear-gradient(transparent,rgba(0,0,0,0.75));border-radius:0 0 8px 8px;margin-top:auto;">
                            <div class="panel-title">2</div>
                        </div>
                    </div>
                </div>
                <!-- p3 -->
                <div class="panel-btn" data-story="3">
                    <div class="panel-glow-ring"></div>
                    <div class="panel-corners">
                        <span style="--cc:#FF00CC"></span><span style="--cc:#00FF88"></span>
                        <span style="--cc:#FFD700"></span><span style="--cc:#00CCFF"></span>
                    </div>
                    <div class="run-strip top" id="rs3t"></div>
                    <div class="run-strip bottom" id="rs3b"></div>
                    <div class="run-strip left" id="rs3l"></div>
                    <div class="run-strip right" id="rs3r"></div>
                    <div class="panel-inner" style="padding:0;position:relative;">
                        <img src="pic3.png"
                            style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:8px;z-index:2;">
                        <div
                            style="position:relative;z-index:6;width:100%;text-align:center;padding:6px;background:linear-gradient(transparent,rgba(0,0,0,0.75));border-radius:0 0 8px 8px;margin-top:auto;">
                            <div class="panel-title">3</div>
                        </div>
                    </div>
                </div>
                <!-- p4 -->
                <div class="panel-btn" data-story="4">

        /* ── STARS ── */
        (function () {
            const sky = document.getElementById('sky');
            for (let i = 0; i < 180; i++) {
                const s = document.createElement('div'); s.className = 'star';
                const sz = Math.random() * 3 + 1;
                s.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;width:${sz}px;height:${sz}px;--d:${(Math.random() * 4 + 1).toFixed(1)}s;animation-delay:${(Math.random() * 5).toFixed(1)}s;`;
                sky.appendChild(s);
            }
        })();

        /* ── BUNTINGS ── */
        (function () {
            const row = document.getElementById('bunting');
            const cols = ['#CC0000', '#FF8C00', '#FFD700', '#228B22', '#1E90FF', '#9932CC', '#FF1493'];
            for (let i = 0; i < 70; i++) {
                const t = document.createElement('div'); t.className = 'flag-tri';
                t.style.setProperty('--c', cols[i % cols.length]);
                t.style.animationDelay = (i * .07) + 's';
                row.appendChild(t);
            }
        })();

        /* ── ARCH BULBS ── */
        function makeBulbs(id, n) {
            const el = document.getElementById(id);
            const bc = ['#FFD700', '#FF4400', '#00FF88', '#FF00AA', '#00CCFF', '#FFFFFF'];
            for (let i = 0; i < n; i++) {
                const b = document.createElement('div'); b.className = 'bulb';
                const c = bc[i % bc.length];
                b.style.setProperty('--bc', c);
                b.style.setProperty('--bd', (0.5 + Math.random() * 1.5).toFixed(2) + 's');
                b.style.animationDelay = (Math.random() * 2).toFixed(2) + 's';
                el.appendChild(b);
            }
        }
        makeBulbs('blink-top', 40); makeBulbs('blink-left', 20); makeBulbs('blink-right', 20);

        /* ── STORIES ── */
        const stories = {
            1: { title: 'බෝසත් වඳුරු රජු සහ වාසස්ථානය', art: 'pic1.png', text: 'ඈත හිමාල පර්වත පාමුල, සිසිල් දිය දහර ගලා බසිනා ගංගා ඉවුරක, අහස සිඹින මහා අඹ වෘක්ෂයක් තිබුණි. එහි හටගත් අඹ ගෙඩි දිව්‍යමය රසයෙන් යුක්ත වූ අතර, රන්වන් පැහැයෙන් බැබළුණි. මේ මනරම් අඹ වනය පාලනය කළේ මහා ප්‍රඥාවන්ත, දයානුකම්පිත බෝසත් වඳුරු රජුය. සිය දහස් ගණනක් වූ වඳුරු පිරිස සරුසාර අඹ වෘක්ෂයේ අතු පතර පනිමින්, මිහිරි අඹ ගෙඩි භුක්ති විඳිමින් ඉතා සතුටින් හා සාමකාමීව ජීවත් වූහ. පරිසරය නිරන්තරයෙන්ම වඳුරන්ගේ සුරතල් හඬින් සහ පක්ෂීන්ගේ ගී නාදයෙන් ජීවමාන විය.' },
            2: { title: 'ගඟට වැටුණු අඹ ගෙඩිය', art: 'pic2.png', text: 'වඳුරු රජු තම පිරිසට නිතරම අවවාද කළේ ගඟ දෙසට බරවී ඇති අතුවල පවතින අඹ ගෙඩි, ඒවා ඉදුණු සැණින් නෙළා ගන්නා ලෙසයි. ඒ, කිසියම් හෝ අඹ ගෙඩියක් ගඟට වැටී දිය දිගේ පහළට ගියහොත් එයින් මිනිසුන්ගෙන් අනතුරක් විය හැකි බැවිනි. නමුත් එක් දිනක, කොළ අත්තකට වැසී තිබූ විශාල, සුවඳැති, රන්වන් අඹ ගෙඩියක් කාටත් නොදැනී නටුවෙන් ගිලිහී ගඟට වැටුණි. එය දිය රැලි මත පාවෙමින් ගොස්, බොහෝ දුර බැහැර පිහිටි බරණැස් නුවර රජතුමාගේ මනරම් රාජකීය ඔරුව අසල නතර විය.' },
            3: { title: 'බරණැස් රජුට අඹ ගෙඩිය හමුවීම', art: 'pic3.png', text: 'රාජකීය සේවකයින් විසින් ගඟේ පාවෙමින් තිබූ මේ අසාමාන්‍ය අඹ ගෙඩිය ගෙන රජතුමාට පිළිගන්වන ලදී. එහි සුවඳින්ම මත්වූ බරණැස් රජු, එය කපා රස බැලීය. පෙර කිසිදා නොවිඳි ඒ අතිමහත් මධුර රසයෙන් මවිත වූ රජුට, මේ දිව්‍යමය පලතුර හටගන්නා වෘක්ෂය දැකීමේ දැඩි ආශාවක් ඇති විය. වහාම ක්‍රියාත්මක වූ රජතුමා, තම සේනාව සහ සොල්දාදුවන් පිරිවරාගෙන, අඹ ගෙඩිය පාවී ආ මඟ ඔස්සේ ගඟ දිගේ ඉහළට ගවේෂණාත්මක සංචාරයක් ආරම්භ කළේය.' },
            4: { title: 'වඳුරු රැළ කොටු වීම', art: 'pic4.png', text: 'දින කිහිපයක වෙහෙසකර ගමනකින් පසු, රජු ඇතුළු සේනාව අතිවිශාල අඹ ගස සොයා ගත්හ. එහි අතු පතර දහස් ගණනක් වඳුරන් සිටිනු දුටු රජු, අඹ ගස වටලන ලෙස තම සොල්දාදුවන්ට අණ කළේය. "එක් වඳුරෙකුටවත් බේරී යාමට ඉඩ නොදෙන්න, උන් සියල්ලෝම විනාශ කර අඹ ගස අප සතු කරගනිමු," රජු ගිගුරුවේය. ආයුධ සන්නද්ධ සොල්දාදුවන් අඹ ගස වටලද්දී, බියට පත් වඳුරු පිරිස කෑගසමින්, ඒ මේ අත දිව යමින් අසරණ වූහ. මරණය අභියස ඔවුන්ට පැන යාමට කිසිදු මඟක් නොතිබුණි.' },
            5: { title: 'බෝසත් වඳුරු රජුගේ තීරණය', art: 'pic5.png', text: 'තම පිරිසගේ මරණ බිය සහ අඳෝනාව ඇසුණු වඳුරු රජු මහත් සේ කම්පාවට පත් විය. නායකයෙකු ලෙස තම පිරිස බේරාගැනීමේ පරම වගකීම ඔහු සතු විය. ගඟෙන් එගොඩ ඇති අනෙක් ඉවුරේ ආරක්ෂිත වනයක් තිබුණද, සාමාන්‍ය වඳුරෙකුට එතරම් විශාල දුරක් පැනීමට නොහැකි විය. තම ජීවිතය ගැන නොසිතූ බෝසත් වඳුරු රජු, තම මහා බලය යොදා එකවරම ගඟෙන් එගොඩට පැනීමට තීරණය කළේ, කෙසේ හෝ තම පිරිසට ගැලවීමේ මඟක් තැනීමේ අදිටනින් යුතුවය.' },
            6: { title: 'වැල් පාලම නිර්මාණය', art: 'pic6.png', text: 'ගඟෙන් එගොඩට පැන ගත් වඳුරු රජු, එදෙස තිබූ ශක්තිමත් වැලක් සොයාගෙන එහි කෙළවරක් තම ඉණෙහි බඳින ලදී. ඉන්පසු ඔහු නැවතත් අඹ ගස දෙසට ළඟාවීමට උපරිම වෙර යොදා පිනුවේය. නමුත් වැලේ දිග මඳක් මදි වූ බැවින්, ඔහුට අඹ ගස වෙත ළඟා විය හැකි වූයේ අත්තක් තදින් දෑතින් අල්ලා ගැනීමෙන් පමණි. දැන්, වඳුරු රජුගේ ශරීරය ගඟ හරහා ඇදුණු ජීවමාන පාලමක් බවට පත්ව ඇත. එක පැත්තකින් වැලද, අනෙක් පැත්තෙන් අඹ අත්තද අල්ලාගෙන, ඔහු තම ශරීරය දැඩි වේදනාවකින් යුතුව දැඩි කරගත්තේය.' },
            7: { title: 'වඳුරන්ගේ ගැලවීම', art: 'pic7.png', text: '"මාගේ ප්‍රියාවෙනි, ප්‍රමාද නොවී මාගේ පිට මතින් පැන අනෙක් ඉවුරට ආරක්ෂිතව යන්න!" වඳුරු රජු වේදනාවෙන් කෑගැසුවේය. රජුගේ අණින්, සිය ගණනක් වඳුරන් එකිනෙකා පිටුපස වඳුරු රජුගේ පිට මතින් පාගමින්, වේගයෙන් අනෙක් ඉවුරට පැන දිව ගියහ. සිය ගණනකගේ බර සහ නියපහරවල් නිසා වඳුරු රජුගේ ශරීරය තුවාල වී, ලේ ගලන්නට විය. නමුත් ඔහුගේ මුහුණේ තිබුණේ තම පිරිස බේරෙනු දැකීමෙන් ඇති වූ ඉවසීම සහ අසිරිමත් කරුණාව පමණි.' },
            8: { title: 'පාවාදීම (දේවදත්ත වඳුරා)', art: 'pic8.png', text: 'සියලුම වඳුරන් පාහේ බේරී ගිය පසු, අවසානයට ඉතිරි වූයේ වඳුරු රජු කෙරෙහි පෙර භවයන්හි සිටම වෛර බැඳ සිටි (පසුකාලීනව දේවදත්ත වූ) නපුරු වඳුරෙකි. වඳුරු රජු විනාශ කිරීමට මෙය කදිම අවස්ථාවක් කරගත් ඔහු, හිතාමතාම ඉතා ඉහළට පැන, මුළු ශක්තියම යොදා වඳුරු රජුගේ කොන්ද මතටම පතිත විය. ඒ දරුණු පහරින් වඳුරු රජුගේ කොන්ද බිඳී ගිය අතර, අහස පුරා අකුණු සැර වැදෙන්නාක් බඳු දරුණු ශබ්දයක් සහ දර්ශනයක් මඟින් එම ද්‍රෝහි ක්‍රියාවේ බිහිසුණු බව පෙන්විය හැක.' },
            9: { title: 'බරණැස් රජුගේ පුදුමය', art: 'pic9.png', text: 'මිහිපිට සිදු වූ මේ උදාර, අසිරිමත් සහ සංවේදී මිනිස් වීරත්වයටත් එහා ගිය පරිත්‍යාගය දෙස බරණැස් රජු බලා සිටියේ දැඩි විශ්මයකින් සහ කඳුළු පිරුණු දෑසිනි. තිරිසන් සතෙකු වුවද තම පිරිස උදෙසා ජීවිතය පූජා කළ ආකාරය දුටු රජුගේ හදවත උණුවිය. වහාම තම සේනාවට අණ දුන් රජු, දුන්න සහ ඊතල බිම දමා, ඉතා ප්‍රවේශමෙන් තුවාල ලැබූ වඳුරු රජුව ගඟෙන් බිමට බා, සේද ඇතිරිල්ලක් මත හොවා සත්කාර කිරීමට කටයුතු කළේය.' },
            10: { title: 'ධර්ම දේශනාව සහ අවසානය', art: 'pic10.png', text: 'මරණාසන්න මොහොතේ පසුවූ වඳුරු රජු දෑස් හැර බරණැස් රජු දෙස බැලීය. රජතුමා බෝසතුන්ගෙන් විමසුවේ, "තම ජීවිතය පරදුවට තබා මෙවැනි පරිත්‍යාගයක් කළේ මන්ද?" කියාය. එවිට බෝසත් වඳුරු රජු, සැබෑ නායකයෙකු යනු තම පිරිස පාලනය කරන්නෙකු නොව, ඔවුන් වෙනුවෙන් තම ජීවිතය වුවද දීමට සැදී පැහැදී සිටින සේවකයෙකු බව පවසමින් රජතුමාට දැහැමි පාලනයක් පිළිබඳ උතුම් ධර්මෝපදේශයක් ලබා දුන්නේය. එම අවවාදය අවසානයේ වඳුරු රජු දෑස් පියාගත් අතර, බරණැස් රජු වඩාත් යහපත් පාලකයෙකු වීමට අධිෂ්ඨාන කර ගත්තේය.' },
        };

        /* ── POPUP ── */
        let cur = 1;
        const ov = document.getElementById('popup-overlay');
        const pT = document.getElementById('popup-title');
        const pA = document.getElementById('popup-story-art');
        const pTx = document.getElementById('popup-text');

        function openStory(n) {
            cur = n; const s = stories[n]; if (!s) return;
            pT.textContent = s.title;

            if (s.art.endsWith('.png') || s.art.endsWith('.jpg') || s.art.endsWith('.jpeg') || s.art.endsWith('.gif')) {
                pA.innerHTML = `<img src="${s.art}" style="max-width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.5);">`;
            } else {
                pA.textContent = s.art;
            }

            pTx.textContent = s.text;
            ov.classList.add('show');
        }
        function closeStory() { ov.classList.remove('show'); }

        document.querySelectorAll('.panel-btn').forEach(b => {
            b.addEventListener('click', () => openStory(+b.dataset.story));
        });
        document.getElementById('popup-close').addEventListener('click', closeStory);
        ov.addEventListener('click', e => { if (e.target === ov) closeStory(); });
        document.getElementById('pop-prev').addEventListener('click', () => { cur = cur > 1 ? cur - 1 : 10; openStory(cur); });
        document.getElementById('pop-next').addEventListener('click', () => { cur = cur < 10 ? cur + 1 : 1; openStory(cur); });

        /* ── SOUND ── */
        let soundOn = false, chimeInt = null;
        const sBtn = document.getElementById('sound-btn');
        const bgMusic = document.getElementById('bg-music');

        function playChime() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [523, 659, 784, 1047].forEach((f, i) => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.type = 'sine'; o.frequency.value = f;
                    g.gain.setValueAtTime(0, ctx.currentTime + i * .18);
                    g.gain.linearRampToValueAtTime(.18, ctx.currentTime + i * .18 + .05);
                    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + i * .18 + .5);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(ctx.currentTime + i * .18); o.stop(ctx.currentTime + i * .18 + .6);
                });
            } catch (e) { }
        }

        sBtn.addEventListener('click', () => {
            soundOn = !soundOn;
            sBtn.textContent = soundOn ? '🔕' : '🔔';

            if (soundOn) {
                // Play sound.mp3
                if (bgMusic) {
                    bgMusic.volume = 0.4; // Sets music volume to 40% so it's not too loud
                    bgMusic.play().catch(err => console.log("Audio play blocked until interaction:", err));
                }

                
            } else {
                // Pause sound.mp3
                if (bgMusic) {
                    bgMusic.pause();
                }

                
            }
        });

        /* ── KEYBOARD ── */
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeStory();
            if (e.key === 'ArrowLeft' && ov.classList.contains('show')) { cur = cur > 1 ? cur - 1 : 10; openStory(cur); }
            if (e.key === 'ArrowRight' && ov.classList.contains('show')) { cur = cur < 10 ? cur + 1 : 1; openStory(cur); }
        });
    </script>
